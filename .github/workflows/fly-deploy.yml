# Auto-deploy to Fly.io on push to main.
#
# Setup (one-time):
#   1. Create a deploy token:  fly tokens create deploy --expiry 8760h
#   2. In GitHub: Settings -> Secrets and variables -> Actions -> New repository
#      secret. Name = FLY_API_TOKEN, value = the token from step 1.
name: Fly Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
